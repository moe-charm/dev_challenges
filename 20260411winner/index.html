<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 You Won!! — DEV April Fools Challenge 2026</title>
  <meta name="description" content="A dramatically over-the-top winner announcement for the DEV April Fools Challenge 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#FFD700; --gold-deep:#B8860B; --gold-glow:rgba(255,215,0,0.4);
      --dark-bg:#0a0a0f; --dark-mid:#1a0a2e;
      --red:#FF2D55; --blue:#007AFF; --pink:#FF85A2;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(180deg,var(--dark-bg) 0%,var(--dark-mid) 100%);background-attachment:fixed;color:#fff;overflow-x:hidden;}

    /* ===== LANG TOGGLE ===== */
    #lang-toggle{position:fixed;top:46px;right:16px;z-index:500;display:flex;gap:6px;align-items:center;}
    .lang-btn{padding:5px 14px;border-radius:99px;border:1px solid rgba(255,215,0,.4);background:rgba(0,0,0,.4);color:rgba(255,255,255,.6);font-size:.8rem;cursor:pointer;backdrop-filter:blur(8px);letter-spacing:.08em;transition:all .2s;}
    .lang-btn.active{background:var(--gold);color:#000;font-weight:700;border-color:var(--gold);}
    #bgm-btn{padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4);color:rgba(255,255,255,.5);font-size:.8rem;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;margin-right:4px;}
    #bgm-btn.on{border-color:var(--gold);color:var(--gold);}
    /* ===== STAR WARS CRAWL ===== */
    #crawl{background:#000;min-height:100vh;overflow:hidden;position:relative;}
    .crawl-fade-top{position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(to bottom,#000 0%,transparent 100%);z-index:2;pointer-events:none;}
    .crawl-fade-bot{position:absolute;bottom:0;left:0;right:0;height:20%;background:linear-gradient(to top,#000 0%,transparent 100%);z-index:2;pointer-events:none;}
    .crawl-stage{position:relative;width:100%;height:100vh;overflow:hidden;}
    .crawl-track{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(1000px,94%);animation:crawl-scroll 100s linear forwards;animation-play-state:paused;padding-bottom:60vh;}
    .crawl-track.running{animation-play-state:running;}
    @keyframes crawl-scroll{from{bottom:0}to{bottom:400%}}
    .crawl-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,3vw,1.6rem);color:var(--gold);letter-spacing:.3em;text-align:center;margin-bottom:32px;opacity:.7;}
    .crawl-intro{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7rem);color:var(--gold);text-align:center;line-height:1.1;margin-bottom:48px;filter:drop-shadow(0 0 30px var(--gold-glow));}
    .crawl-body{color:rgba(255,215,0,.8);font-size:clamp(1.2rem,3vw,1.8rem);line-height:1.8;text-align:center;margin-bottom:48px;}
    .crawl-credits{margin-top:20px;}
    .crawl-credit-row{display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(255,215,0,.1);font-size:clamp(.8rem,1.8vw,1rem);}
    .crawl-credit-row .role{color:rgba(255,215,0,.45);letter-spacing:.08em;font-family:'Bebas Neue',sans-serif;}
    .crawl-credit-row .name{color:var(--gold);font-weight:700;}

    /* ===== SPLASH ===== */
    #splash{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#0a0a0f 0%,#1a0a2e 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;padding:24px;transition:opacity .8s ease,visibility .8s ease;}
    #splash.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .splash-trophy{font-size:clamp(4rem,15vw,8rem);animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px var(--gold));}
    .splash-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,4.5rem);background:linear-gradient(135deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
    .splash-sub{font-size:clamp(.9rem,2vw,1.15rem);opacity:.6;text-align:center;max-width:420px;}
    .name-input-wrap{position:relative;width:min(480px,90vw);}
    #name-input{width:100%;padding:18px 60px 18px 24px;background:rgba(255,255,255,.06);border:2px solid rgba(255,215,0,.3);border-radius:16px;color:#fff;font-size:1.2rem;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .3s,box-shadow .3s;}
    #name-input:focus{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow);}
    #name-input::placeholder{color:rgba(255,255,255,.3);}
    #celebrate-btn{padding:16px 48px;background:linear-gradient(135deg,var(--gold-deep),var(--gold));color:#000;border:none;border-radius:99px;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.15em;cursor:pointer;box-shadow:0 0 30px var(--gold-glow);transition:transform .2s,box-shadow .2s;}
    #celebrate-btn:hover{transform:scale(1.05);box-shadow:0 0 50px var(--gold-glow);}
    .splash-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

    /* ===== CANVAS ===== */
    #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}

    /* ===== STARS ===== */
    .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;opacity:0;}
    @keyframes twinkle{from{opacity:0;transform:scale(.8)}to{opacity:.9;transform:scale(1.2)}}

    /* ===== TICKER ===== */
    .ticker-wrap{position:fixed;top:0;left:0;right:0;background:var(--red);z-index:200;overflow:hidden;padding:6px 0;box-shadow:0 2px 20px rgba(255,45,85,.8);}
    .ticker-track{display:inline-flex;white-space:nowrap;animation:ticker 30s linear infinite;}
    .ticker-track span{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;padding:0 60px;color:white;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ===== SECTIONS ===== */
    section{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:100px 24px 60px;text-align:center;}
    .reveal{opacity:0;transform:translateY(60px);transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1);}
    .reveal.visible{opacity:1;transform:translateY(0);}

    /* ===== OPENING ===== */
    #opening{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0f 70%);}
    .opening-label{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,3vw,1.4rem);letter-spacing:.4em;color:var(--gold);margin-bottom:24px;animation:pulse-gold 2s ease-in-out infinite;}
    .opening-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,5rem);color:rgba(255,255,255,.5);margin-bottom:10px;}
    .opening-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,14vw,10rem);line-height:.9;background:linear-gradient(135deg,var(--gold) 0%,#fff 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px var(--gold-glow));animation:shimmer 3s linear infinite;background-size:200%;}
    .opening-sub{margin-top:30px;font-size:clamp(1rem,2.5vw,1.4rem);opacity:.7;letter-spacing:.05em;}
    .trophy-mega{font-size:clamp(4rem,15vw,10rem);animation:float 3s ease-in-out infinite;display:block;margin-bottom:20px;filter:drop-shadow(0 0 30px var(--gold));}
    .scroll-hint{position:absolute;bottom:30px;font-size:.85rem;opacity:.4;animation:bounce 1.5s ease-in-out infinite;letter-spacing:.1em;}
    @keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-20px) rotate(3deg)}}
    @keyframes pulse-gold{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

    /* ===== BREAKING ===== */
    #breaking{background:radial-gradient(ellipse at center,#300010 0%,#0a0a0f 70%);}
    .news-badge{background:var(--red);color:white;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.3em;padding:6px 20px;border-radius:4px;margin-bottom:30px;animation:blink-red 1s step-end infinite;display:inline-block;}
    @keyframes blink-red{0%,100%{background:var(--red)}50%{background:#8b0000}}
    .breaking-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,9vw,7rem);line-height:1;color:#fff;text-shadow:0 0 60px rgba(255,45,85,.8);margin-bottom:20px;}
    .breaking-sub{font-size:clamp(1rem,2.5vw,1.5rem);color:#ffaaaa;max-width:700px;margin:0 auto;text-align:center;}
    .breaking-stamp{margin-top:40px;font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,6rem);color:var(--gold);border:8px solid var(--gold);padding:10px 40px;display:inline-block;transform:rotate(-8deg);box-shadow:0 0 40px var(--gold-glow),inset 0 0 40px var(--gold-glow);}

    /* ===== PRAISE SECTION (generic) ===== */
    .section-eyebrow{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.4em;color:var(--gold);margin-bottom:16px;opacity:.7;}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,6rem);line-height:1;background:linear-gradient(135deg,var(--gold) 0%,#fffbe0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px;filter:drop-shadow(0 0 20px var(--gold-glow));}
    .praise-text{font-size:clamp(1.1rem,2.8vw,1.6rem);line-height:1.8;max-width:780px;color:rgba(255,255,255,.85);margin:0 auto;text-align:center;}
    .emoji-burst{font-size:clamp(3rem,8vw,5rem);margin:20px 0;animation:spin-slow 4s linear infinite;display:block;}
    @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    #genius{background:radial-gradient(ellipse at center,#1a1500 0%,#0a0a0f 70%);}
    #history{background:radial-gradient(ellipse at center,#200800 0%,#0a0a0f 70%);}
    .fire-row{display:flex;justify-content:center;gap:0;font-size:clamp(2rem,6vw,4rem);margin:20px 0;}
    .fire-row span{animation:fire-dance var(--d) ease-in-out infinite alternate;display:inline-block;transform-origin:bottom center;}
    @keyframes fire-dance{from{transform:rotate(-8deg) scaleY(.9)}to{transform:rotate(8deg) scaleY(1.1)}}

    /* ===== TEAPOT ===== */
    #teapot{background:radial-gradient(ellipse at center,#001020 0%,#0a0a0f 70%);}
    .teapot-mega{font-size:clamp(6rem,20vw,14rem);animation:teapot-spin 3s cubic-bezier(.68,-.55,.27,1.55) infinite;display:block;margin:10px 0;filter:drop-shadow(0 0 40px rgba(0,122,255,.5));}
    @keyframes teapot-spin{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(20deg) scale(1.1)}50%{transform:rotate(0deg) scale(1)}75%{transform:rotate(-20deg) scale(1.1)}100%{transform:rotate(0deg) scale(1)}}
    .code-418{font-family:'Oswald',sans-serif;font-size:clamp(4rem,15vw,10rem);color:var(--blue);text-shadow:0 0 60px rgba(0,122,255,.6);line-height:1;}

    /* ===== QUOTE ===== */
    #comment{background:radial-gradient(ellipse at center,#0a001a 0%,#0a0a0f 70%);}
    .quote-block{position:relative;max-width:800px;background:rgba(255,255,255,.04);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:50px 50px 40px;backdrop-filter:blur(10px);box-shadow:0 0 60px rgba(255,215,0,.05);}
    .quote-mark{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:var(--gold);opacity:.2;position:absolute;top:-20px;left:20px;line-height:1;}
    .quote-text{font-size:clamp(1rem,2.5vw,1.5rem);line-height:2;color:rgba(255,255,255,.9);}
    .quote-author{margin-top:24px;font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:.1em;text-align:right;}
    .mic-emoji{font-size:2.5rem;display:inline-block;animation:mic-shake .3s ease infinite alternate;}
    @keyframes mic-shake{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}

    /* ===== STATS ===== */
    #stats{background:radial-gradient(ellipse at center,#001530 0%,#0a0a0f 70%);}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:900px;width:100%;margin-top:30px;}
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(0,122,255,.2);border-radius:16px;padding:30px 20px;text-align:center;}
    .stat-num{font-family:'Oswald',sans-serif;font-size:clamp(2rem,6vw,3.5rem);color:var(--gold);filter:drop-shadow(0 0 10px var(--gold-glow));line-height:1;margin-bottom:8px;}
    .stat-label{font-size:.85rem;opacity:.6;letter-spacing:.05em;}
    .stat-bar-wrap{margin-top:12px;background:rgba(255,255,255,.08);border-radius:99px;height:6px;overflow:hidden;}
    .stat-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:99px;width:0%;transition:width 2s cubic-bezier(.22,1,.36,1);}
    .reveal.visible .stat-bar{width:var(--w);}

    /* ===== WORLD ===== */
    #world{background:radial-gradient(ellipse at center,#001008 0%,#0a0a0f 70%);}
    .flag-stream{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;max-width:700px;margin:30px 0;}
    .flag-item{font-size:clamp(1.6rem,4vw,2.5rem);animation:flag-wave var(--d2) ease-in-out infinite alternate;}
    @keyframes flag-wave{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-8px) rotate(5deg)}}
    .world-messages{display:flex;flex-direction:column;gap:16px;max-width:680px;width:100%;margin-top:10px;}
    .world-msg{background:rgba(255,255,255,.05);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:14px 20px;text-align:left;font-size:clamp(.9rem,2vw,1.1rem);opacity:0;transform:translateX(-30px);transition:opacity .6s ease,transform .6s ease;}
    .reveal.visible .world-msg{opacity:1;transform:translateX(0);}
    .world-msg:nth-child(1){transition-delay:.1s}.world-msg:nth-child(2){transition-delay:.3s}.world-msg:nth-child(3){transition-delay:.5s}.world-msg:nth-child(4){transition-delay:.7s}.world-msg:nth-child(5){transition-delay:.9s}
    .msg-flag{margin-right:10px;font-size:1.2em;}

    /* ===== END CARD ===== */
    #endcard{background:radial-gradient(ellipse at center,#0a0a0f 0%,#000 70%);min-height:100vh;}
    .end-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,5vw,3.5rem);letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:16px;}
    .end-date{font-family:'Oswald',sans-serif;font-size:clamp(1rem,3vw,1.8rem);color:rgba(255,255,255,.15);margin-bottom:60px;}
    .end-punchline{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,7rem);background:linear-gradient(135deg,var(--pink) 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px var(--gold-glow));line-height:1;}
    .cat-dance{font-size:clamp(3rem,10vw,6rem);display:inline-block;animation:cat-dance .5s ease-in-out infinite alternate;filter:drop-shadow(0 0 20px var(--pink));}
    @keyframes cat-dance{from{transform:rotate(-10deg) translateY(0)}to{transform:rotate(10deg) translateY(-10px)}}
    .back-link{display:inline-block;margin-top:60px;color:rgba(255,255,255,.3);font-size:.85rem;text-decoration:none;letter-spacing:.1em;border-bottom:1px solid rgba(255,255,255,.1);transition:color .3s,border-color .3s;}
    .back-link:hover{color:var(--gold);border-color:var(--gold);}

    /* ===== SCROLL CONTROL ===== */
    #scroll-control{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;align-items:center;gap:10px;}
    #pause-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:99px;padding:8px 18px;font-size:.8rem;letter-spacing:.1em;cursor:pointer;backdrop-filter:blur(10px);transition:background .3s;font-family:'Noto Sans JP',sans-serif;}
    #pause-btn:hover{background:rgba(255,255,255,.2);}
    .scroll-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse-dot 1.2s ease-in-out infinite;}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
    #scroll-control.paused .scroll-dot{animation:none;opacity:.3;}
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="stars" id="stars"></div>

<!-- LANG TOGGLE + BGM -->
<div id="lang-toggle">
  <button id="bgm-btn" onclick="toggleBGMBtn()" title="Toggle Music">🎵</button>
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">JP</button>
</div>

<!-- SCROLL CONTROL -->
<div id="scroll-control">
  <div class="scroll-dot"></div>
  <button id="pause-btn">⏸ Pause</button>
</div>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span id="ticker-content"></span>
  </div>
</div>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="splash-stars" id="splash-stars"></div>
  <span class="splash-trophy">🏆</span>
  <h1 class="splash-title" id="splash-title">Who's the Winner Today?</h1>
  <p class="splash-sub" id="splash-sub">Enter a name to celebrate someone spectacular.</p>
  <div class="name-input-wrap">
    <input id="name-input" type="text" maxlength="40" autocomplete="off" spellcheck="false">
  </div>
  <button id="celebrate-btn" onclick="startCelebration()">🎉 CELEBRATE!</button>
</div>

<!-- ===== MAIN PAGE ===== -->
<div id="main-page" style="display:none">

  <!-- OPENING -->
  <section id="opening">
    <span class="trophy-mega reveal">🏆</span>
    <div class="opening-label reveal" id="op-label"></div>
    <div class="opening-name reveal" id="op-name"></div>
    <h1 class="opening-title reveal" id="op-title"></h1>
    <p class="opening-sub reveal" id="op-sub"></p>
    <div class="scroll-hint" id="scroll-hint-text"></div>
  </section>

  <!-- BREAKING -->
  <section id="breaking">
    <div class="reveal">
      <div class="news-badge" id="news-badge"></div>
      <h2 class="breaking-title" id="breaking-title"></h2>
      <p class="breaking-sub" id="breaking-sub"></p>
      <div class="breaking-stamp" id="breaking-stamp"></div>
    </div>
  </section>

  <!-- GENIUS -->
  <section id="genius">
    <div class="reveal">
      <div class="section-eyebrow" id="genius-eyebrow"></div>
      <h2 class="section-title" id="genius-title"></h2>
      <span class="emoji-burst">✨</span>
      <p class="praise-text" id="genius-text"></p>
    </div>
  </section>

  <!-- HISTORY -->
  <section id="history">
    <div class="reveal">
      <div class="section-eyebrow" id="history-eyebrow"></div>
      <h2 class="section-title" id="history-title"></h2>
      <div class="fire-row">
        <span style="--d:.6s">🔥</span><span style="--d:.4s">🔥</span><span style="--d:.7s">🔥</span>
        <span style="--d:.5s">🔥</span><span style="--d:.8s">🔥</span><span style="--d:.45s">🔥</span>
      </div>
      <p class="praise-text" id="history-text"></p>
    </div>
  </section>

  <!-- GALAXY -->
  <section id="galaxy">
    <div class="reveal">
      <div class="section-eyebrow" id="galaxy-eyebrow"></div>
      <h2 class="section-title" id="galaxy-title"></h2>
      <span class="emoji-burst" style="font-size: 8rem;">📡</span>
      <p class="praise-text" id="galaxy-text"></p>
    </div>
  </section>

  <!-- MULTIVERSE -->
  <section id="multiverse">
    <div class="reveal">
      <div class="section-eyebrow" id="multiverse-eyebrow"></div>
      <h2 class="section-title" id="multiverse-title"></h2>
      <div class="fire-row" style="font-size: 5rem;">🌀🌀🌀</div>
      <p class="praise-text" id="multiverse-text"></p>
    </div>
  </section>

  <!-- DIVINE -->
  <section id="divine">
    <div class="reveal">
      <div class="section-eyebrow" id="divine-eyebrow"></div>
      <h2 class="section-title" id="divine-title"></h2>
      <span class="emoji-burst" style="font-size: 10rem;">⚡</span>
      <p class="praise-text" id="divine-text"></p>
    </div>
  </section>

  <!-- TEAPOT -->
  <section id="teapot">
    <div class="reveal">
      <div class="section-eyebrow" id="teapot-eyebrow"></div>
      <h2 class="section-title" id="teapot-title"></h2>
      <span class="teapot-mega">🫖</span>
      <div class="code-418">418</div>
      <p class="praise-text" id="teapot-text" style="margin-top:24px"></p>
    </div>
  </section>

}

  document.getElementById('world-eyebrow').textContent = t.worldEyebrow;
  document.getElementById('world-title').textContent = t.worldTitle;
  const msgs = t.worldMsgs(n);
  document.getElementById('world-msgs').innerHTML = msgs.map(m =>
    `<div class="world-msg"><span class="msg-flag">${m.flag}</span>${m.msg}<br><small style="opacity:.4">${m.src}</small></div>`
  ).join('');

  // End
  document.getElementById('end-title').textContent = t.endTitle;
  document.getElementById('end-date').textContent = t.endDate;
  document.getElementById('end-punchline').textContent = t.endPunchline;
  document.getElementById('final-thanks').textContent = t.finalThanks;
  document.getElementById('back-link').textContent = t.backLink;

  // Crawl
  if (n && t.crawlLogo && document.getElementById('crawl-logo')) {
    document.getElementById('crawl-logo').textContent = t.crawlLogo;
    document.getElementById('crawl-intro').textContent = t.crawlIntro(n);
    document.getElementById('crawl-body').innerHTML = t.crawlBody(n).replace(/\n\n/g, '<br><br>');
    const credits = t.crawlCredits(n);
    document.getElementById('crawl-credits').innerHTML = credits.map(c =>
      `<div class="crawl-credit-row"><span class="role">${c.role}</span><span class="name">${c.name}</span></div>`
    ).join('');
  }

  // Pause btn
  updatePauseBtn();
}

// On page load, apply splash language
applyI18n();

// ===== SPLASH START =====
function startCelebration() {
  const raw = document.getElementById('name-input').value.trim();
  winnerName = raw || 'You';
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('main-page').style.display = 'block';
  applyI18n();

  // Init observers after main page is visible
  setTimeout(() => {
    initObservers();
    document.querySelectorAll('#opening .reveal').forEach(el => el.classList.add('visible'));
    confettiBurst(120);
    autoScrolling = true;
    autoScroll();
    // BGM starts after fanfare
    setTimeout(() => {
      SoundEngine.startBGM();
      document.getElementById('bgm-btn').classList.add('on');
    }, 1800);
  }, 100);

  // Crawl: start animation when section enters view
  const crawlObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.getElementById('crawl-track').classList.add('running');
        crawlObs.disconnect();
      }
    });
  }, { threshold: 0.1 });
  const crawlEl = document.getElementById('crawl');
  if (crawlEl) crawlObs.observe(crawlEl);
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startCelebration();
});

// ===== STARS =====
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    c.appendChild(s);
  }
})();

// ===== CONFETTI =====
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [], confettiRunning = false;
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function createParticle() {
  return { x:Math.random()*canvas.width, y:-10, w:Math.random()*10+5, h:Math.random()*5+3,
    color:['#FFD700','#FF85A2','#007AFF','#FF2D55','#fff','#a78bfa'][Math.floor(Math.random()*6)],
    vx:(Math.random()-.5)*3, vy:Math.random()*3+1.5, rot:Math.random()*360, rotV:(Math.random()-.5)*8, opacity:1 };
}
function confettiBurst(count=80) {
  for (let i=0;i<count;i++) particles.push(createParticle());
  if (!confettiRunning) animateConfetti();
}
function animateConfetti() {
  confettiRunning = true;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p => p.opacity>0.01 && p.y<canvas.height+20);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.04;
    if (p.y>canvas.height*0.7) p.opacity-=0.015;
    ctx.save(); ctx.globalAlpha=p.opacity; ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
  });
  if (particles.length>0) requestAnimationFrame(animateConfetti); else confettiRunning=false;
}

// ===== OBSERVERS =====
function initObservers() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); confettiBurst(40); }
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  const statsObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        animateCounter(document.getElementById('cnt-devs'), 99.7, '', '%');
        animateCounter(document.getElementById('cnt-stars'), 1428571);
        animateCounter(document.getElementById('cnt-teapot'), 418, '+', '%');
        confettiBurst(100); statsObs.disconnect();
      }
    });
  }, { threshold:0.3 });
  const st = document.getElementById('stats');
  if (st) statsObs.observe(st);
}

function animateCounter(el, target, pre='', suf='', dur=2000) {
  const start = performance.now();
  (function up(now) {
    const t = Math.min((now-start)/dur,1), e = 1-Math.pow(1-t,4);
    el.textContent = pre + Math.floor(e*target).toLocaleString() + suf;
    if (t<1) requestAnimationFrame(up);
  })(performance.now());
}

// ===== AUTO SCROLL =====
let autoScrolling = false, scrollPaused = false;
const SPEED = 1.2;
const pauseBtn = document.getElementById('pause-btn');
const scrollCtrl = document.getElementById('scroll-control');
pauseBtn._manual = false;

function autoScroll() {
  if (!scrollPaused && autoScrolling) {
    const max = document.body.scrollHeight - window.innerHeight;
    if (window.scrollY < max) window.scrollBy(0, SPEED);
    else { autoScrolling = false; scrollCtrl.style.display='none'; confettiBurst(200); return; }
  }
  if (autoScrolling) requestAnimationFrame(autoScroll);
}

window.addEventListener('wheel', () => {
  scrollPaused = true; clearTimeout(window._rt);
  window._rt = setTimeout(() => { if (!pauseBtn._manual) { scrollPaused=false; updatePauseBtn(); } }, 2500);
  updatePauseBtn();
}, { passive:true });

pauseBtn.addEventListener('click', () => {
  pauseBtn._manual = !pauseBtn._manual;
  scrollPaused = pauseBtn._manual;
  updatePauseBtn();
});

function updatePauseBtn() {
  const t = i18n[currentLang];
  if (scrollPaused) { pauseBtn.textContent=t.resumeTxt; scrollCtrl.classList.add('paused'); }
  else { pauseBtn.textContent=t.pauseTxt; scrollCtrl.classList.remove('paused'); }
}

function toggleBGMBtn() {
  const on = SoundEngine.toggleBGM();
  const btn = document.getElementById('bgm-btn');
  if (on) { btn.classList.add('on'); btn.title = 'Music ON'; }
  else { btn.classList.remove('on'); btn.title = 'Music OFF'; }
}
</script>

<script src="js/sound.js"></script>
<script src="js/effects.js"></script>
<script>
// ===== SOUND + FX INTEGRATION =====

// FX init runs once main page appears
const _origStart = startCelebration;
startCelebration = function() {
  // 1. Drum roll
  SoundEngine.init();
  SoundEngine.playDrumRoll(0.6);
  // 2. Screen flash gold
  setTimeout(() => FXEngine.screenFlash('rgba(255,215,0,0.6)', 300), 200);
  // 3. Fanfare after drum roll
  setTimeout(() => SoundEngine.playFanfare(), 650);
  // 4. Laser rays burst
  setTimeout(() => FXEngine.showLasers(2000), 300);
  // 5. FX engine init
  FXEngine.initAll();
  // 6. Screen shake
  setTimeout(() => FXEngine.screenShake(10, 500), 700);
  // 7. Fireworks
  setTimeout(() => FXEngine.burstFireworks(5), 800);
  // 8. Glitch on opening title
  setTimeout(() => {
    const t = document.getElementById('op-title');
    if (t) FXEngine.addGlitch(t);
  }, 1200);

  _origStart();
};

// Override initObservers to add sounds+FX per section
const _origInitObs = initObservers;
initObservers = function() {
  _origInitObs();
  // Section reveal: mini firework
  const obs2 = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !e.target._sounded) {
        e.target._sounded = true;
        // SoundEngine.playPop(); // Remove beep overlap
        FXEngine.burstFireworks(2);
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('section').forEach(s => obs2.observe(s));

  // Endcard: cat meow
  const endObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !e.target._meowed) {
        e.target._meowed = true;
        setTimeout(() => SoundEngine.playCatMeow(), 800);
        FXEngine.burstFireworks(6);
        FXEngine.screenFlash('rgba(255,133,162,0.3)', 500);
      }
    });
  }, { threshold: 0.4 });
  const ec = document.getElementById('endcard');
  if (ec) endObs.observe(ec);
};

// Stats: tick sound on counter
const _origCounter = animateCounter;
animateCounter = function(el, target, pre='', suf='', dur=2000) {
  const start = performance.now();
  let lastTick = 0;
  (function up(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    const val = Math.floor(ease * target);
    el.textContent = pre + val.toLocaleString() + suf;
    // tick every ~80ms
    if (now - lastTick > 80) { SoundEngine.playTick(); lastTick = now; }
    if (t < 1) requestAnimationFrame(up);
  })(performance.now());
};
</script>
