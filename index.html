<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyanZip - Launching...</title>
    <meta http-equiv="refresh" content="0; url=./20260402april/">
    <style>
        :root {
            --bg1: #fff1f5;
            --bg2: #ffe0ea;
            --ink: #5a4050;
            --accent: #ff6f9b;
            --panel: rgba(255, 255, 255, 0.82);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 35%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
        }

        .card {
            width: min(560px, calc(100vw - 32px));
            padding: 32px 28px;
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(255, 111, 155, 0.18);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            color: var(--accent);
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 18px;
            font-size: 1rem;
            line-height: 1.7;
        }

        a {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.9rem;
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>🐈 NyanZip 🐾</h1>
        <p>
            公開ページをアプリ本体へ案内するにゃ。
            すぐに開かない場合は下のボタンを押してほしいにゃ。
        </p>
        <p>
            <a href="./20260402april/">Open NyanZip</a>
        </p>
        <div class="hint">If the redirect is slow, your browser may be blocking auto-forwarding.</div>
    </main>
    <script>
        location.replace('./20260402april/');
    </script>
</body>
</html>
