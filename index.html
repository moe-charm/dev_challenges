<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe-Charm's Dev Challenges</title>
    <style>
        :root {
            --primary-color: #ff85a2;
            --bg-color: #fff0f3;
            --card-bg: #ffffff;
            --text-color: #5d4a4a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px 24px;
            text-align: center;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .container {
            max-width: 900px;
            width: 95%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px 20px;
        }

        .challenge-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid transparent;
            min-height: 190px;
        }

        .challenge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 133, 162, 0.2);
            border-color: var(--primary-color);
        }

        .challenge-card .date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
        }

        .challenge-card .title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .challenge-card .description {
            font-size: 0.95rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .challenge-card .btn {
            margin-top: 15px;
            padding: 8px 15px;
            background: var(--primary-color);
            color: white;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding: 40px 20px;
            font-size: 0.9rem;
            opacity: 0.7;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dev Challenges</h1>
        <p>moe-charm による、日々のチャレンジ一覧だにゃ🐾</p>
    </header>

    <div class="container">
        <a href="./20260402april/" class="challenge-card">
            <div>
                <div class="date">2026.04.02</div>
                <div class="title">NyanZip</div>
                <div class="description">
                    "The World's Cutest Compression Tool"<br>
                    猫語で圧縮するジョークアプリにゃ！
                </div>
            </div>
            <div class="btn">View Challenge</div>
        </a>
    </div>

    <footer>
        &copy; 2026 moe-charm. Built with 💖 and Code.
    </footer>
</body>
</html>
